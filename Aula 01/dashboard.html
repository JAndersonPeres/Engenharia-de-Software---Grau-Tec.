<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard - Norta</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>Dashboard</h2>
        <p>Bem-vindo ao sistema da Norta</p>
        <ul>
            <li>Total de clientes</li>
            <li>Projetos em andamento</li>
            <li>Relatórios</li>
        </ul>
        <h3>Indicadores do Sistema</h3>
        <div class="cards">
            <div class="card">
                <h4>Clientes</h4>
                <p>120</p>
            </div>
            <div class="card">
                <h4>Projetos</h4>
                <p>8</p>
            </div>
            <div class="card">
                <h4>Relatórios</h4>
                <p>5</p>
            </div>
        </div>
        <footer>
            <p>Sistema desenvolvido para gestão da Agência Norta</p>
        </footer>
    </body>
</html>
